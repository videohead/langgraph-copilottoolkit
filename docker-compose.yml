networks:
  langgraph-net:
    driver: bridge

services:
  mcp-filesystem:
    build:
      context: .
      dockerfile: mcp-filesystem/Dockerfile
    container_name: langgraph-mcp-filesystem
    networks:
      - langgraph-net
    ports:
      - "8765:8765"
    environment:
      MCP_FILESYSTEM_ROOT: /workspace-data
      MCP_FILESYSTEM_READ_ONLY: "false"
    volumes:
      - ./workspace-data:/workspace-data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8765/mcp || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - langgraph-net
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  langgraph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-dev
    networks:
      - langgraph-net
    depends_on:
      ollama:
        condition: service_healthy
      mcp-filesystem:
        condition: service_healthy
    ports:
      - "8123:8000"
    env_file:
      - path: .env
        required: false
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5-coder:7b
      MCP_FILESYSTEM_URL: http://mcp-filesystem:8765/mcp
    volumes:
      - ./:/app
    command: ["langgraph", "dev", "--host", "0.0.0.0", "--port", "8000"]

  django:
    build:
      # Root context so the Dockerfile can reach both src/ and django/
      context: .
      dockerfile: django/Dockerfile
    container_name: langgraph-django
    networks:
      - langgraph-net
    depends_on:
      ollama:
        condition: service_healthy
      mcp-filesystem:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5-coder:7b
      MCP_FILESYSTEM_URL: http://mcp-filesystem:8765/mcp
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-secret-key-please-change}"
      DEBUG: "true"
    volumes:
      # Hot-reload: mount live source over the container's copied files
      - ./django:/app
      - ./src:/app/src:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: langgraph-frontend
    networks:
      - langgraph-net
    depends_on:
      django:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DJANGO_INTERNAL_URL: http://django:8080
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      # Hot-reload: mount live source; preserve container node_modules
      - ./frontend:/app
      - /app/node_modules

  charts:
    image: nginx:alpine
    container_name: langgraph-charts
    networks:
      - langgraph-net
    ports:
      - "8124:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro

